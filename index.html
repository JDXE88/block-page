<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Access Restricted</title>
  <style>
    :root {
      --bg: #0b0c14;
      --panel: #141625;
      --line: #2a2d45;
      --text: #f5f6fa;
      --muted: #cdb293;
      --orange: #ff8800;
      --sunflower: #ffcc99;
      --violet: #9966ff;
      --red: #cc4444;
      --black: #0a0a0a;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Arial Narrow", Arial, Helvetica, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .frame {
      width: min(720px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
    }

    .top {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 12px;
      padding: 16px 16px 0;
      background: #10121c;
    }

    .elbow {
      min-height: 58px;
      background: var(--orange);
      border-top-left-radius: 20px;
      border-bottom-left-radius: 20px;
      border-top-right-radius: 52px;
      border-bottom-right-radius: 52px;
      position: relative;
    }

    .elbow::after {
      content: "";
      position: absolute;
      right: 10px;
      top: 0;
      width: 42px;
      height: 100%;
      background: var(--bg);
      border-radius: 999px;
    }

    .titlebar,
    .status,
    .domain {
      border-radius: 999px;
    }

    .titlebar {
      min-height: 58px;
      background: var(--sunflower);
      color: var(--black);
      display: flex;
      align-items: center;
      padding: 0 18px;
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .content {
      padding: 22px 16px 18px;
    }

    .status {
      display: inline-block;
      background: var(--red);
      color: white;
      padding: 9px 14px;
      margin-bottom: 16px;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    h1 {
      color: var(--sunflower);
      font-size: clamp(1.9rem, 4.5vw, 2.8rem);
      line-height: 1;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    p {
      color: var(--muted);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 1rem;
      line-height: 1.7;
      max-width: 60ch;
    }

    .label {
      margin-top: 22px;
      margin-bottom: 8px;
      color: var(--violet);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .domain {
      width: 100%;
      background: linear-gradient(90deg, var(--orange), var(--sunflower));
      color: var(--black);
      padding: 15px 18px;
      font-family: "Courier New", monospace;
      font-size: clamp(1rem, 2vw, 1.2rem);
      font-weight: 700;
      word-break: break-word;
    }

    .footer {
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-family: Arial, Helvetica, sans-serif;
    }

    .accent {
      height: 8px;
      margin-top: 16px;
      border-radius: 999px;
      background: linear-gradient(
        90deg,
        var(--violet) 0 22%,
        var(--orange) 22% 68%,
        var(--sunflower) 68% 100%
      );
    }

    @media (max-width: 600px) {
      .top {
        grid-template-columns: 1fr;
      }

      .elbow,
      .titlebar {
        min-height: 52px;
      }

      .titlebar {
        justify-content: center;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <main class="frame">
    <section class="top">
      <div class="elbow" aria-hidden="true"></div>
      <div class="titlebar">Network Filter</div>
    </section>

    <section class="content">
      <div class="status">Access Restricted</div>

      <h1>Connection Blocked</h1>

      <p>
        This request was blocked by the network DNS filtering system.
        The destination may match a restricted rule for ads, tracking,
        malware, telemetry, or another blocked category.
      </p>

      <div class="label">Target Domain</div>
      <div class="domain" id="blockedDomain">unknown-domain</div>

      <div class="footer">Local DNS policy enforcement active</div>
      <div class="accent" aria-hidden="true"></div>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const fromQuery = params.get('domain');

    let fromReferrer = '';
    try {
      fromReferrer = document.referrer ? new URL(document.referrer).hostname : '';
    } catch {
      fromReferrer = '';
    }

    const domain = fromQuery || fromReferrer || 'unknown domain';
    document.getElementById('blockedDomain').textContent = domain;
    document.title = `Blocked: ${domain}`;
  </script>
</body>
</html>
