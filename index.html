<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Access Restricted</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="frame">
    <section class="top">
      <div class="titlebar">Network Filter</div>
    </section>

    <section class="content">
      <div class="status">Access Restricted</div>

      <h1>Connection Blocked</h1>

      <p>
        This request was blocked by the network DNS filtering system.
        The destination may match a restricted rule for ads, tracking,
        malware, telemetry, or another blocked category.
      </p>

      <div class="label">Target Domain</div>
      <div class="domain" id="blockedDomain">unknown-domain</div>

      <div class="footer">Local DNS policy enforcement active</div>
      <div class="accent" aria-hidden="true"></div>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const fromQuery = params.get('domain');

    let fromReferrer = '';
    try {
      fromReferrer = document.referrer ? new URL(document.referrer).hostname : '';
    } catch {
      fromReferrer = '';
    }

    const domain = fromQuery || fromReferrer || 'unknown domain';
    document.getElementById('blockedDomain').textContent = domain;
    document.title = `Blocked: ${domain}`;
  </script>
</body>
</html>
